<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="160" y1="80" x2="864" y2="944" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#262B38"/>
      <stop offset="1" stop-color="#14161D"/>
    </linearGradient>
    <linearGradient id="node" x1="452" y1="240" x2="572" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7FA8F6"/>
      <stop offset="1" stop-color="#4C7DF0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5B8DEF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#5B8DEF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- app tile -->
  <rect x="64" y="64" width="896" height="896" rx="216" fill="url(#tile)"/>
  <rect x="64.5" y="64.5" width="895" height="895" rx="215.5" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="1"/>
  <!-- recall-node glow -->
  <circle cx="512" cy="300" r="150" fill="url(#glow)"/>
  <!-- M monogram: two memory peaks -->
  <path d="M300 722 V346 L512 588 L724 346 V722"
